version: 2

project_name: cloudflared-project

builds:
  - main: .
    binary: cloudflared-project
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/kev/cloudflared-cli/cmd.Version={{.Version}}
      - -X github.com/kev/cloudflared-cli/cmd.Commit={{.Commit}}
      - -X github.com/kev/cloudflared-cli/cmd.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
